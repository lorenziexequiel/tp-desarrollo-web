<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 1 - Flexbox</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .controles { display: flex; gap: 10px; margin-bottom: 20px; }
        #contenedor-tarjetas { display: flex; flex-wrap: wrap; gap: 20px; }
        .tarjeta { background-color: #e3f2fd; border: 1px solid #dee2e6; border-radius: 8px; padding: 15px; width: 250px; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); }
        .tarjeta h3 { margin-top: 0; color: #0d6efd; }
        a { text-decoration: none; color: #333; font-weight: bold; }
        button { padding: 8px 12px; cursor: pointer; border-radius: 4px; border: 1px solid #ccc; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Herramientas de Desarrollo</h2>
        <a href="index.html">⬅ Volver al inicio</a>
    </div>

    <div class="controles">
        <button id="btn-ordenar">Ordenar Alfabéticamente</button>
        <button id="btn-original">Orden Original</button>
    </div>

    <hr>

    <div id="contenedor-tarjetas"></div>

    <script>
        const herramientas = [
            { nombre: "Power Apps", desc: "Desarrollo ágil de aplicaciones empresariales." },
            { nombre: "AI Builder", desc: "Modelos de inteligencia artificial integrados." },
            { nombre: "Python", desc: "Lenguaje versátil para análisis y automatización." },
            { nombre: "HTML & CSS", desc: "Bases estructurales y visuales de la web." },
            { nombre: "JavaScript", desc: "Lógica e interactividad para el navegador." },
            { nombre: "Azure Document Intelligence", desc: "Extracción avanzada de datos en documentos." }
        ];

        const contenedor = document.getElementById('contenedor-tarjetas');

        function mostrarTarjetas(arreglo) {
            contenedor.innerHTML = ''; 
            arreglo.forEach(item => {
                const div = document.createElement('div');
                div.className = 'tarjeta';
                div.innerHTML = `<h3>${item.nombre}</h3><p>${item.desc}</p>`;
                contenedor.appendChild(div);
            });
        }

        // Función con estado de carga simulado
        function cargarDatosConDelay() {
            contenedor.innerHTML = '<p>Cargando datos...</p>';
            setTimeout(() => {
                mostrarTarjetas(herramientas);
            }, 500); // Retraso de medio segundo
        }

        // Eventos
        document.getElementById('btn-ordenar').addEventListener('click', () => {
            const copiaOrdenada = [...herramientas].sort((a, b) => a.nombre.localeCompare(b.nombre));
            mostrarTarjetas(copiaOrdenada);
        });

        document.getElementById('btn-original').addEventListener('click', () => {
            mostrarTarjetas(herramientas);
        });

        // Inicialización
        cargarDatosConDelay();
    </script>
</body>
</html>
