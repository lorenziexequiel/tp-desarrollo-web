<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 3 - Personas con React</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        form { margin-bottom: 20px; display: flex; gap: 5px; flex-wrap: wrap; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    </style>
</head>
<body>
    <header>
        <h2>Gestión de Personas (React)</h2>
        <a href="index.html">⬅ Volver al inicio</a>
    </header>

    <div id="root"></div>

    <script type="text/babel">
        function App() {
            const [personas, setPersonas] = React.useState([]);
            const [form, setForm] = React.useState({ nombre: '', apellido: '', edad: '', altura: '', peso: '' });

            const handleChange = (e) => setForm({ ...form, [e.target.name]: e.target.value });

            const agregarPersona = (e) => {
                e.preventDefault();
                const imc = (form.peso / (form.altura * form.altura)).toFixed(2);
                setPersonas([...personas, { ...form, imc, id: Date.now() }]);
                setForm({ nombre: '', apellido: '', edad: '', altura: '', peso: '' });
            };

            const eliminarPersona = (id) => setPersonas(personas.filter(p => p.id !== id));

            return (
                <div>
                    <form onSubmit={agregarPersona}>
                        <input name="nombre" placeholder="Nombre" value={form.nombre} onChange={handleChange} required />
                        <input name="apellido" placeholder="Apellido" value={form.apellido} onChange={handleChange} required />
                        <input name="edad" type="number" placeholder="Edad" value={form.edad} onChange={handleChange} required />
                        <input name="altura" type="number" step="0.01" placeholder="Altura (m)" value={form.altura} onChange={handleChange} required />
                        <input name="peso" type="number" step="0.1" placeholder="Peso (kg)" value={form.peso} onChange={handleChange} required />
                        <button type="submit">Agregar</button>
                    </form>
                    <table>
                        <thead><tr><th>Nombre</th><th>Apellido</th><th>Edad</th><th>Altura</th><th>Peso</th><th>IMC</th><th>Acción</th></tr></thead>
                        <tbody>
                            {personas.map(p => (
                                <tr key={p.id}>
                                    <td>{p.nombre}</td><td>{p.apellido}</td><td>{p.edad}</td><td>{p.altura}</td><td>{p.peso}</td><td>{p.imc}</td>
                                    <td><button onClick={() => eliminarPersona(p.id)}>Eliminar</button></td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
